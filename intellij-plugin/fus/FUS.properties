educational.ai.features=The metric is reported in case a user has called the corresponding JetBrains Academy AI features.
educational.ai.features.hints.code.hint.accepted=The event is recorded in case the shown CodeHint was accepted.
educational.ai.features.hints.code.hint.cancelled=The event is recorded in case the shown CodeHint was cancelled.
educational.ai.features.hints.get.hint.button.clicked=The event is recorded when `Get Hint` button is clicked.
educational.ai.features.hints.hint.banner.closed=The event is recorded when the hint banner is closed by user.
educational.ai.features.hints.hint.banner.shown=Represents the type of banner that is shown to the user.
educational.ai.features.hints.retry.clicked=The event is recorded when the `Retry` action link is clicked.
educational.ai.features.hints.show.in.code.clicked=The event is recorded `Show in code` link is clicked from the CodeHint banner.
educational.ai.features.theory.lookup.disabled=The event is recorded when the theory lookup is disabled by the user.
educational.ai.features.theory.lookup.finished.with.error=The event is recorded in case an error occurs during theory lookup.
educational.ai.features.theory.lookup.finished=The event is recorded when the theory lookup is successfully completed.
educational.ai.features.theory.lookup.retried=The event is recorded when a retry of the theory lookup process is initiated.
educational.ai.features.theory.lookup.started=The event is recorded when the theory lookup process starts.
educational.ai.features.theory.lookup.term.hovered=The event is recorded when the user hovers over the highlighted term in the theory lookup.
educational.ai.features.theory.lookup.term.viewed=The event is recorded when the user keeps the term tooltip open for more than 2 second.
educational.ai.features.translation.button.clicked=The event is recorded when the translation button is clicked.
educational.ai.features.translation.disabled=The event is recorded when the course translation is disabled.
educational.ai.features.translation.finished.with.error=The event is recorded in case an error occurs during translation.
educational.ai.features.translation.finished=The event is recorded when the translation is successfully completed.
educational.ai.features.translation.language.picker.opened=The event is recorded when the language picker is opened by the user.
educational.ai.features.translation.retried=The event is recorded when a retry of the translation process is initiated.
educational.ai.features.translation.started=The event is recorded when the translation process starts.
educational.ai.features.translation.updated=The event is recorded when the translation is successfully updated.
educational.counters=The metric is reported in case a user has called the corresponding JetBrains Academy features.
educational.counters.authorization=The event is recorded in case a user logs in or out on any platform we support.
educational.counters.check.task=The event is recorded in case a user checks a task in any course.
educational.counters.community.tab.opened.by.link=The event is logged when a user clicks the 'See community solutions' link to view solutions from other students. The event is marked as successful if clicking the link opens the Community tab. If the Community tab was already open, the event logs a failure.
educational.counters.create.course.archive=The event is recorded in case an educator generates an archive for their course in Course Creation mode.
educational.counters.create.course.preview=The event is recorded in case an educator creates a course preview for a course in Course Creation mode.
educational.counters.create.new.course.clicked=The event is recorded in case a user opens the Create Course dialog.
educational.counters.create.new.file.in.non.template.based.framework.lesson.by.learner=The event is recorded in case a user creates a new file in a Non-Template Based Framework Lesson in Learner mode.
educational.counters.edu.project.created=The event is recorded in case a user creates a new course.
educational.counters.edu.project.opened=The event is recorded in case a user opens an already existing course.
educational.counters.hint=The event is recorded in case a user expands/collapses hints in the Task Description.
educational.counters.import.course=The event is recorded in case a user opens a course from a disk in Learner mode.
educational.counters.leave.feedback=The event is recorded in case a user clicks the Leave Feedback icon in the check result panel.
educational.counters.link.clicked=The event is recorded in case a user clicks a link within a task text.
educational.counters.linkedin.dialog.shown=The event is recorded in case a user receives a suggestion to post to LinkedIn about completing a course or task (e.g., JB Academy project completion).
educational.counters.navigate.to.task=The event is recorded in case a user navigates to the next or previous task/stage/problem.
educational.counters.obtain.jba.token=The event is recorded in case a request for a JetBrains account access token is processed.
educational.counters.open.community.tab=The event is recorded in case a user opens the Community panel on the Submissions tab to explore other learners' solutions.
educational.counters.open.course.selection.view=The event is recorded in case a user opens the Course Selection view.
educational.counters.open.task=The event is recorded in case a user opens any task.
educational.counters.peek.solution=The event is recorded in case a user clicks the Peek Solution link in the check result panel.
educational.counters.peer.solution.diff.opened=The event is recorded in case a user opens the Community Solution diff.
educational.counters.post.course=The event is recorded in case an educator uploads or updates their course on Stepik or Marketplace in Course Creation mode.
educational.counters.preview.task.file=The event is recorded in case an educator uses Preview for a task file in Course Creation mode.
educational.counters.rate.marketplace.course=The event is recorded in case a user clicks on the Rate Course icon in the Task Description.
educational.counters.revert.task=The event is recorded in case a user successfully resets content of a task.
educational.counters.review.stage.topics=The event is recorded in case a user clicks Review Topics for a stage in a JetBrains Academy project.
educational.counters.select.tab.course.selection.view=The event is recorded in case a user selects a tab in the Course Selection view.
educational.counters.show.full.output=The event is recorded in case a user clicks the Show Full Output link in the check result panel.
educational.counters.solution.share.state=The event is recorded in case a user's sharing preference is updated.
educational.counters.student.pack.promotion.link.followed=The event is recorded when a user clicks the "Apply Now" button in the Student Pack Promotion dialog.
educational.counters.student.pack.promotion.refused=The event is recorded when a user clicks the "Not a student" button or presses Escape in the Student Pack Promotion dialog.
educational.counters.study.item.created=The event is recorded in case a new study item (different types of lessons and tasks) is created.
educational.counters.submission.attempt=The event is recorded in case a user makes a submission attempt, regardless of whether it fails or succeeds.
educational.counters.submission.invite.action=The event is recorded in case a user responds to the feature invitation, regardless of whether it is accepted or declined.
educational.counters.submission.share.invite.shown=The event is recorded in case a user enables the Solution Sharing banner/notification.
educational.counters.synchronize.course=The event is recorded in case a course is synchronized with its latest version.
educational.counters.task.created=Event is logged whenever a new task is created within a lesson, indicating the type of the lesson.
educational.counters.ui.onboarding.finished=Track when a user completes the onboarding tour and clicks the final "Finish" button.
educational.counters.ui.onboarding.relaunched=Track when a user manually opens the onboarding tour again from an alternative entry point (e.g. Help menu).
educational.counters.ui.onboarding.skipped=Track when a user clicks "Skip" button. The index and the step key are recorded
educational.counters.ui.onboarding.started=Track when a user clicks the "Next" button to begin the onboarding tour.
educational.counters.user.agreement.changed=The event is recorded when the state of the user agreement is changed.
educational.counters.x.dialog.shown=The event is recorded in case a user receives a suggestion to tweet about completing a course or task (e.g., JB Academy project completion).
educational.state=The metric is reported in case a user has JetBrains Academy plugin installed and contains data about settings related to the plugin.
educational.state.course=The metric shows base info about educational course opened in IDE
educational.state.task.panel=Task Panel
